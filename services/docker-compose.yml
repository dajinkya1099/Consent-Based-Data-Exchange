version: "3.9"

services:
  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    depends_on:
      - verification-service

  profile-service:
    build: ./profile-service
    ports:
      - "8002:8002"

  verification-service:
    build: ./verification-service
    ports:
      - "8003:8003"

  dashboard-service:
    build: ./dashboard-service
    ports:
      - "8004:8004"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - profile-service
      - verification-service
      - dashboard-service
